<body>

    <nav class="navbar">
        <div class="logo">
            <img src="img/rasp.png" alt="Logo" class="logo-img">
            <span class="nomSite">WaveTrack</span>
        </div>
        
        <ul class="nav-links">
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Produits</a></li>

        </ul>
    </nav>
    
    <header>
        <h1>WaveTrack</h1>
        <h2>Abonnement</h2>
    </header>

    <main>

        <div class = "container">

            <div class = "option">
                <p>Combo de domotique initial:  XEuro</p>
                <p>Option:</p>

                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Assurance (X Euro)
                </label><br>

                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Analyse des données (X Euro)
                </label><br>

                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Je souhaite une étude de ma salle pour connaitre le nombre d'outils recommendé. (X Euro)
                </label><br>

                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Maintenance plus fréquente (tout les mois au lieu de tout les 6 mois par ex) (X Euro)
                </label>
            </div>

            <div class = "choixsalle">
                <label for="nbsalle">nombre de salle :</label>

                <select id="nbsalle">
                <option>1 salle</option>
                <option>2 salles</option>
                <option>3 salles</option>
                <option>4 salles</option>
                <option>5 salles</option>
                <option>+ de 5 salles</option>
                </select>
            </div>
        </div>

        <div class = "bouttondroite">
            <button class = "boutton" onclick="window.location.href='Inscription.html'">Valider</button>
        </div>

    </main>
