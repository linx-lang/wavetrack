<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveTrack</title>
    <link rel="stylesheet" href="css/Inscription.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="img/rasp.png" alt="Logo" class="logo-img">
            <span class="nomSite">WaveTrack</span>
        </div>
        
        <ul class="nav-links">
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Produits</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">À propos??</a></li>
            <li><img src="img/user.png" alt="Profile" class="user-img"></li>
        </ul>
    </nav>

     <header>
        <h1>WaveTrack</h1>
        <h2>Inscription</h2>
    </header>

    <main>
    
        <div class="container">
            <div class="row justify-content-center gap-4">
                <div class = "formuperso col-md-5 col-sm-12 ">
                    <div class = "info form" method="POST" action="">
                        <input type="text" class="form-control" placeholder="Nom" name="nomPro">
                        <input type="text" class="form-control" placeholder="Prenom" name="prenomPro">
                        <input type="email" class="form-control" placeholder="Mail" name="emailPro">
                        <input type="password" class="form-control" placeholder="MDP" name="mdpPro">
                    </div>
                    <br>
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Etes vous bien propriétaires
                    </label>
                    <br>
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Accepter les conditions d'utilisation.
                    </label>

                    <a href="condition.html" class="conditions">Lire les conditions</a>
                    <br>
                    <br>
                    <button class = "boutton" onclick="window.location.href='Abonnement.html'">Abonnement</button>
                </div>
            
        

                <div class = "formusalle col-md-5 col-sm-12 ">
                    <div class = "info form-label">
                        <input type="text" placeholder="Nom de la salle" class="form-control" name="nomSalle">
                        <input type="text" placeholder="Capacité" class="form-control" name="capaciteSalle">
                        <input type="text" placeholder="Code Postal" class="form-control" name="codePosSalle">
                        <input type="text" placeholder="Adresse" class="form-control" name="adresseSalle">
                        <textarea class="longtxt" placeholder="Autre" class="form-control" name="autreSalle"></textarea>
                        <textarea class="longtxt" placeholder="Veuillez préciser vos périodes de fermetures" class="form-control" name="periodeFermetureSalle"></textarea>
                    </div>

                    <p>Horaires de la semaine:</p>
                
                    <div class="jour-ligne">
                        <input type="checkbox" id="lundi" name="jour[]">
                        <label for="lundi">Lundi</label>
                        <div class = "info">
                            <div class="horaireP" id="hlundi">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Lundi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Lundi][]">
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('lundi',this)">+ Ajouter horaire</button>
                    </div>

                    <div class="jour-ligne">
                        <input type="checkbox" id="mardi" name="jour[]">
                        <label for="mardi">Mardi</label>
                        <div class = "info">
                            <div class="horaireP" id="hmardi">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Mardi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Mardi][]">
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('mardi',this)">+ Ajouter horaire</button>
                    </div>

                    <div class="jour-ligne">
                        <input type="checkbox" id="mercredi" name="jour[]" >
                        <label for="mercredi">Mercredi</label>
                        <div class = "info" id="hmercredi">
                            <div class="horaireP">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Mercredi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Mercredi][]">
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('mercredi',this)">+ Ajouter horaire</button>
                    </div>
                
                    <div class="jour-ligne">
                        <input type="checkbox" id="jeudi" name="jour[]">
                        <label for="jeudi">Jeudi</label>
                        <div class = "info" id="hjeudi">
                            <div class="horaireP">
                                <input type="text" placeholder="Horaire deb " name="horaireD[Jeudi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Jeudi][]">
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('jeudi',this)">+ Ajouter horaire</button>
                    </div>


                    <div class="jour-ligne">
                        <input type="checkbox" id="vendredi" name="jour[]">
                        <label for="vendredi">Vendredi</label>
                        <div class = "info" id="hvendredi">
                            <div class="horaireP">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Vendredi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Vendredi][]">
                            </div>
                        </div>

                        <button type="button" onclick="ajouterHoraire('vendredi',this)">+ Ajouter horaire</button>
                    </div>
                

                    <div class="jour-ligne">
                        <input type="checkbox" id="samedi" name="jour[]">
                        <label for="samedi">Samedi</label>
                        <div class = "info" id="hsamedi">
                            <div class="horaireP">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Samedi][]">
                                <input type="text" placeholder="Horaire fin" name="horaireF[Samedi][]">
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('samedi',this)">+ Ajouter horaire</button>
                    </div>
                
                    <div class="jour-ligne">
                        <input type="checkbox" id="dimanche" name="jour[]">
                        <label for="dimanche">Dimanche</label>
                        <div class = "info" id="hdimanche">
                            <div class="horaireP">
                                <input type="text" placeholder="Horaire deb" name="horaireD[Dimanche][]" >
                                <input type="text" placeholder="Horaire fin" name="horaireF[Dimanche][]" >
                            </div>
                        </div>
                        <button type="button" onclick="ajouterHoraire('dimanche',this)">+ Ajouter horaire</button>
                    </div>
                </div>
            </div>
        </div>

        <br>
        <div class = "bouttondroite">
            <button class = "boutton" onclick="window.location.href='PaiementInscription.html'">Valider</button>
        </div>
    
    </main>

    <footer>
        <p>Kozlov-mercier Nina - Issa Lina - Akbaba Julia - Doumergue Louise - Girard Alexia - 
                <a href="Contactavant.html" class="contactfooter">Nos Contacts</a></p>
    </footer>

</body>
</html>
